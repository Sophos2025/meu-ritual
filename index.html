<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal da Abundância Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --deep-blue: #0A192F;
            --slate: #112240;
            --light-slate: #233554;
            --white: #E6F1FF;
            --accent: #64FFDA;
            --yes: #4CAF50;
            --no: #F44336;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-blue);
            color: var(--white);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--slate);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 50px;
        }

        h1 {
            color: var(--gold);
            text-align: center;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .date-display {
            text-align: center;
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* Dashboards */
        .dashboard {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .stat-item { margin-bottom: 12px; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--gold); display: flex; justify-content: space-between; }
        .progress-bar { height: 8px; background: #050a14; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.5s; background: linear-gradient(90deg, var(--gold), #fff); }

        /* Afirmação do Dia */
        .section-title { font-size: 14px; color: var(--accent); margin: 25px 0 10px; text-transform: uppercase; border-bottom: 1px solid rgba(100, 255, 218, 0.1); padding-bottom: 5px; }
        
        textarea, input[type="text"] {
            width: 100%;
            background: var(--light-slate);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 10px;
        }

        /* Lista de Rituais Estilo SIM/NÃO */
        .ritual-card {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ritual-name { font-size: 13px; flex: 1; padding-right: 10px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-choice {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            opacity: 0.3;
        }
        .btn-yes { background: var(--yes); color: white; }
        .btn-no { background: var(--no); color: white; }
        .btn-choice.active { opacity: 1; box-shadow: 0 0 10px rgba(255,255,255,0.2); transform: scale(1.1); }

        /* Frequências e Timer */
        .timer-container {
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--gold);
        }
        .timer-display { font-size: 32px; font-weight: bold; color: var(--gold); margin-bottom: 10px; }
        
        .freq-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-freq {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold);
            color: var(--white);
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-freq.active { background: var(--gold); color: var(--deep-blue); font-weight: bold; }

        .timer-btns button {
            background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 5px 15px; border-radius: 20px; cursor: pointer; margin: 0 2px; font-size: 11px;
        }

        /* Galeria de Insights */
        .insights-gallery {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .insight-box {
            background: var(--light-slate);
            border: 1px solid var(--gold);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            color: var(--gold);
            cursor: pointer;
            transition: 0.3s;
        }
        .insight-box:hover { background: var(--gold); color: var(--deep-blue); }

        /* Modal do Insight */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--slate);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            max-width: 400px;
            text-align: center;
            position: relative;
        }
        .modal-text { font-style: italic; font-size: 18px; line-height: 1.6; }
        .close-modal {
            position: absolute; top: 10px; right: 15px;
            color: var(--gold); font-size: 24px; cursor: pointer;
        }

        .backup-btns { display: flex; gap: 5px; margin-top: 20px; justify-content: center; }
        .btn-sm { font-size: 9px; padding: 5px; background: none; border: 1px solid #444; color: #888; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Portal da Abundância</h1>
    <div class="date-display" id="dateText"></div>

    <!-- Dashboards -->
    <div class="dashboard">
        <div class="stat-item">
            <div class="stat-label">Energia Vital (Sintonia Total) <span id="energy-val">0%</span></div>
            <div class="progress-bar"><div id="energy-bar" class="progress-fill"></div></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: var(--gold);">
            <span>🔥 Constância: <span id="streak-count">0</span> dias</span>
            <span id="status-msg">Vibrando Baixo</span>
        </div>
    </div>

    <!-- Afirmação do Dia -->
    <div class="section-title">Norte Mental (Afirmação do Dia)</div>
    <input type="text" id="dailyAffirmation" placeholder="Eu sou próspero, eu sou luz..." oninput="saveDailyData()">

    <!-- Painel de Meditação Solfeggio -->
    <div class="section-title">Frequências de Cura Solfeggio</div>
    <div class="timer-container">
        <div class="timer-display" id="timer">10:00</div>
        
        <div class="freq-grid">
            <button class="btn-freq" onclick="setFreq(432, this)">432Hz<br><small>Cura</small></button>
            <button class="btn-freq" onclick="setFreq(528, this)">528Hz<br><small>Milagres</small></button>
            <button class="btn-freq" onclick="setFreq(639, this)">639Hz<br><small>Conexão</small></button>
            <button class="btn-freq" onclick="setFreq(741, this)">741Hz<br><small>Despertar</small></button>
            <button class="btn-freq" onclick="setFreq(852, this)">852Hz<br><small>Intuição</small></button>
            <button class="btn-freq" onclick="setFreq(963, this)">963Hz<br><small>Divino</small></button>
            <button class="btn-freq" onclick="setFreq(999, this)" style="grid-column: span 3;">999Hz - Unidade Suprema</button>
        </div>

        <div class="timer-btns">
            <button onclick="startTimer(5)">5m</button>
            <button onclick="startTimer(10)">10m</button>
            <button onclick="startTimer(20)">20m</button>
            <button onclick="toggleAudio()" id="audioBtn" style="border-color: var(--gold); color: var(--gold); font-weight: bold;">▶ INICIAR SOM</button>
        </div>
    </div>

    <!-- Rituais -->
    <div id="ritual-render-area"></div>

    <!-- Diário de Manifestação -->
    <div class="section-title">Diário de Manifestação</div>
    <textarea id="manifestationDiary" rows="4" placeholder="Escreva no tempo presente..." oninput="saveDailyData()"></textarea>

    <!-- Galeria de Insights -->
    <div class="section-title">Galeria de Insights Desbloqueados</div>
    <div class="insights-gallery" id="insightGallery">
        <!-- Gerado via JS -->
    </div>

    <div class="backup-btns">
        <button class="btn-sm" onclick="exportData()">Backup</button>
        <button class="btn-sm" onclick="importData()">Restaurar</button>
        <button class="btn-sm" onclick="resetRituals()">Resetar Rituais</button>
    </div>
</div>

<!-- Modal para as Frases -->
<div id="insightModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalText" class="modal-text"></div>
        <div style="color: var(--gold); margin-top: 20px; font-size: 10px; letter-spacing: 2px;">PORTAL DA ABUNDÂNCIA</div>
    </div>
</div>

<audio id="bellSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    const DEFAULT_RITUALS = {
        "Manhã": ["Afirmações Eu acordo agora com...", "Exercício físico"],
        "Fluxo Livre": ["Meditação Elainne", "Meditação Dra. Próton", "Frequência Otávio", "Ressonância Harmônica", "Meditação do perdão", "Afirmações Eu Sou", "Visualização criativa", "Mantras Aura Money", "Diário da gratidão (escrever 10 motivos)"],
        "Noite": ["Afirmações Eu vou dormir com..."]
    };

    const INSIGHTS = [
        "A riqueza é o estado mental em que você se sente pleno.",
        "Tudo o que você deseja já existe no campo quântico. Sintonize.",
        "A gratidão é a porta de entrada para a abundância infinita.",
        "Sinta como se já fosse real, e o universo manifestará.",
        "A sua vibração cria a sua realidade. Escolha luz.",
        "Você é um ímã para tudo o que acredita ser verdade.",
        "A escassez é uma ilusão; a fonte é inesgotável.",
        "O dinheiro é energia sagrada em movimento de troca.",
        "Limpe o passado para que o novo possa entrar hoje.",
        "Sua consciência é a única substância da realidade.",
        "Cada pensamento é um comando para o seu destino.",
        "A prosperidade flui para quem celebra o sucesso alheio.",
        "Você não atrai o que quer, você atrai o que você É.",
        "O silêncio da meditação é onde a criação acontece.",
        "Sua intuição é a voz da abundância te guiando.",
        "Agradeça pelo que ainda não chegou como se já estivesse aqui.",
        "Grandes portas se abrem para corações gratos.",
        "O universo é abundante e você é parte inseparável dele.",
        "Foque na expansão e o mundo se expandirá para você.",
        "Eu Sou a ressurreição e a vida da minha opulência divina."
    ];

    let rituals = JSON.parse(localStorage.getItem('portal_rituais_lista')) || DEFAULT_RITUALS;
    let audioCtx = null, oscillator = null, currentFreq = 432, timerInterval = null;

    function init() {
        const d = new Date();
        document.getElementById('dateText').innerText = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        renderRituals();
        renderGallery();
        loadDailyData();
        updateStats();
        checkStreak();
    }

    // Gerenciar Rituais
    function renderRituals() {
        const area = document.getElementById('ritual-render-area');
        const today = getTodayKey();
        const saved = JSON.parse(localStorage.getItem('portal_progresso_' + today) || "{}");
        let html = '';
        for (let cat in rituals) {
            html += `<div class="section-title">${cat}</div>`;
            rituals[cat].forEach(r => {
                const status = saved[r];
                html += `
                    <div class="ritual-card">
                        <div class="ritual-name">${r}</div>
                        <div class="btn-group">
                            <button class="btn-choice btn-yes ${status === true ? 'active' : ''}" onclick="toggleRitual('${r}', true)">SIM</button>
                            <button class="btn-choice btn-no ${status === false ? 'active' : ''}" onclick="toggleRitual('${r}', false)">NÃO</button>
                        </div>
                    </div>`;
            });
        }
        area.innerHTML = html;
    }

    function toggleRitual(name, value) {
        const today = getTodayKey();
        let saved = JSON.parse(localStorage.getItem('portal_progresso_' + today) || "{}");
        saved[name] = (saved[name] === value) ? undefined : value;
        localStorage.setItem('portal_progresso_' + today, JSON.stringify(saved));
        renderRituals();
        updateStats();
    }

    // Frequências e Timer
    function setFreq(hz, btn) {
        currentFreq = hz;
        document.querySelectorAll('.btn-freq').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (audioCtx) { toggleAudio(); toggleAudio(); } // Reinicia se já estiver tocando
    }

    function toggleAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(currentFreq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            document.getElementById('audioBtn').innerText = "⏸ PARAR SOM";
        } else {
            audioCtx.close(); audioCtx = null;
            document.getElementById('audioBtn').innerText = "▶ INICIAR SOM";
        }
    }

    function startTimer(min) {
        clearInterval(timerInterval);
        let sec = min * 60;
        timerInterval = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(sec<=0) { 
                clearInterval(timerInterval); 
                document.getElementById('bellSound').play();
                if(!audioCtx) toggleAudio(); // Desliga se terminar
            }
        }, 1000);
    }

    // Galeria de Insights
    function renderGallery() {
        const gallery = document.getElementById('insightGallery');
        gallery.innerHTML = INSIGHTS.map((_, i) => `
            <div class="insight-box" onclick="openModal(${i})">${i + 1}</div>
        `).join('');
    }

    function openModal(index) {
        document.getElementById('modalText').innerText = `"${INSIGHTS[index]}"`;
        document.getElementById('insightModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('insightModal').style.display = 'none';
    }

    // Estatísticas
    function updateStats() {
        const today = getTodayKey();
        const saved = JSON.parse(localStorage.getItem('portal_progresso_' + today) || "{}");
        const total = Object.values(rituals).flat().length;
        const done = Object.values(saved).filter(v => v === true).length;
        
        const score = (done / total) * 100;
        document.getElementById('energy-bar').style.width = score + "%";
        document.getElementById('energy-val').innerText = Math.round(score) + "%";

        if(score === 100 && !window.celebratedToday) {
            confetti({ particleCount: 150, colors: ['#D4AF37', '#64FFDA'] });
            document.getElementById('bellSound').play();
            window.celebratedToday = true;
        }
    }

    // Auxiliares
    function getTodayKey() { return new Date().toLocaleDateString('pt-BR'); }
    function saveDailyData() {
        const data = { aff: document.getElementById('dailyAffirmation').value, diary: document.getElementById('manifestationDiary').value };
        localStorage.setItem('portal_texto_' + getTodayKey(), JSON.stringify(data));
        updateStats();
    }
    function loadDailyData() {
        const data = JSON.parse(localStorage.getItem('portal_texto_' + getTodayKey()) || "{}");
        document.getElementById('dailyAffirmation').value = data.aff || "";
        document.getElementById('manifestationDiary').value = data.diary || "";
    }
    function checkStreak() {
        let streak = 0, d = new Date();
        while(true) {
            let key = d.toLocaleDateString('pt-BR');
            let data = JSON.parse(localStorage.getItem('portal_progresso_' + key) || "{}");
            if(Object.values(data).filter(v => v !== undefined).length >= Object.values(rituals).flat().length) {
                streak++; d.setDate(d.getDate()-1);
            } else { if(key === getTodayKey()) { d.setDate(d.getDate()-1); continue; } break; }
        }
        document.getElementById('streak-count').innerText = streak;
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(localStorage)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `portal_backup.json`; a.click();
    }
    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const data = JSON.parse(ev.target.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }
    function resetRituals() { if(confirm("Resetar rituais?")) { localStorage.setItem('portal_rituais_lista', JSON.stringify(DEFAULT_RITUALS)); location.reload(); } }

    window.onload = init;
</script>
</body>
</html>
